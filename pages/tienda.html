<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda | PlantStore</title>

    <link rel="stylesheet" href="../css/tienda.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>

    <div class="container-header">

        <div class="logo">
            🌿 <span>PlantStore</span>
        </div>

        <!-- 🔍 BUSCADOR -->
        <input type="text" id="buscador" placeholder="Buscar plantas...">

    </div>

    <h1>Tienda online</h1>
    <h2>Elegí tus plantas favoritas</h2>

</header>

<!-- ================= NAV ================= -->
<nav>
  <ul class="nav-menu">
    <li><a href="../index.html"><strong>Inicio</strong></a></li>
    <li><a href="#interior"><strong>Interior</strong></a></li>
    <li><a href="#exterior"><strong>Exterior</strong></a></li>
    <li><a href="#exoticas"><strong>Exóticas</strong></a></li>
    <li><a href="#insumos"><strong>Insumos</strong></a></li>
    <li><a href="#ofertas"><strong>Ofertas</strong></a></li>
    
  </ul>
</nav>

<!-- ================= INTERIOR ================= -->
<section id="interior">
    <h2>🌱 Plantas de Interior</h2>

    <div class="grid-productos" id="productos-interior">
        <!-- JS inserta productos acá -->
    </div>
</section>

<!-- ================= EXTERIOR ================= -->
<section id="exterior">
    <h2>🌳 Plantas de Exterior</h2>

    <div class="grid-productos" id="productos-exterior">
        <!-- JS inserta productos acá -->
    </div>
</section>

<!-- ================= EXOTICAS ================= -->
<section id="exoticas">
    <h2>🌺 Plantas Exóticas</h2>

    <div class="grid-productos" id="productos-exoticas">
        <!-- JS inserta productos acá -->
    </div>
</section>

<!-- ================= CARRITO ================= -->
<section class="carrito">

    <h2>🛒 Tu carrito</h2>

    <div id="lista-carrito">
        <p>Tu carrito está vacío</p>
    </div>

    <button id="btn-whatsapp">
        Finalizar pedido por WhatsApp
    </button>

</section>

<!-- ================= FOOTER ================= -->
<footer>
    <p>© 2026 PlantStore</p>
</footer>


<!-- JS -->
<script src="../tienda.js"></script>

</body>
</html>
